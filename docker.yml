---
version: '3'

includes:
  color: color.yml

tasks:
  wait-for-ready:
    silent: true
    vars:
      DOCKER_WAIT_FOR_READY_ATTEMPTS: '{{.DOCKER_WAIT_FOR_READY_ATTEMPTS | default 30}}'
      DOCKER_WAIT_FOR_READY_SLEEP_TIME: '{{.DOCKER_WAIT_FOR_READY_SLEEP_TIME | default 5}}'
    cmds:
      - |
        echo "{{.DOCKER_WAIT_FOR_READY_ATTEMPTS}}"
        echo "{{.DOCKER_WAIT_FOR_READY_SLEEP_TIME}}"
        exit 0
        attempts={{.DOCKER_WAIT_FOR_READY_ATTEMPTS}}
        while ! docker info > /dev/null 2>&1
        do
          echo "{{.TEXT_YELLOW}}Waiting for docker to come up...{{.TEXT_RESET}}"
          sleep {{.DOCKER_WAIT_FOR_READY_SLEEP_TIME}}
          let attempts=$attempts-1
          if [ $attempts -eq 0 ]
          then
            echo "{{.TEXT_RED}}docker never came up!{{.TEXT_RESET}}"
            exit 1
          fi
        done
        echo "{{.TEXT_GREEN}}Docker came up!{{.TEXT_RESET}}"
    status:
      - docker info > /dev/null 2>&1
