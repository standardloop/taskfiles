---
version: '3'

includes:
  color: color.yml
  docker: docker.yml

tasks:
  default:
    aliases: [all]
    silent: true
    deps:
      - start

  start:
    run: once
    silent: true
    aliases: [run, deploy, on, init]
    vars:
      FLAGS: '{{.COLIMA_FLAGS | default ""}}'
    cmds:
      - colima start {{.COLIMA_FLAGS}}
      - task: docker:wait-for-ready
    status:
      - colima status > /dev/null 2>&1
      - docker info > /dev/null 2>&1

  clean:
    run: once
    aliases: [destroy, shutdown, delete, off]
    cmds:
      - colima delete
