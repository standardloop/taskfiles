---
version: '3'

includes:
  color: color.yml
  util: util.yml

tasks:
  default:
    aliases: [all]
    silent: true
    deps:
      - start

  start:
    run: once
    silent: true
    aliases: [run, deploy, on, init]
    cmds:
      - colima start
      - task: util:wait-for-docker-to-come-up
    status:
      - colima status > /dev/null 2>&1
      - docker info > /dev/null 2>&1

  clean:
    run: once
    aliases: [destroy, shutdown, delete, off]
    cmds:
      - colima delete
