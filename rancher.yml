---
version: '3'

includes:
  color: color.yml
  docker: docker.yml

tasks:
  default:
    aliases: [all]
    silent: true
    deps:
      - start

  start:
    run: once
    silent: true
    aliases: [run, deploy, on, init]
    vars:
      RANCHER_FLAGS: '{{.RANCHER_FLAGS | default ""}}'
    cmds:
      - rdctl start --application.start-in-background {{.RANCHER_FLAGS}}
      - task: docker:wait-for-ready
    status:
      - rdctl list-settings > /dev/null 2>&1
      - docker info > /dev/null 2>&1

  clean:
    run: once
    aliases: [destroy, shutdown, delete, off]
    cmds:
      - rdctl shutdown
