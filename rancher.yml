---
version: '3'

includes:
  color: color.yml

tasks:
  default:
    aliases: [all]
    silent: true
    deps:
      - start

  start:
    run: once
    silent: true
    aliases: [run, deploy, on, init]
    cmds:
      - rdctl start --application.start-in-background
      - |
        attempts=30
        while ! docker info > /dev/null 2>&1
        do
          echo "{{.TEXT_YELLOW}}Waiting for docker to come up....{{.TEXT_RESET}}"
          sleep 5
          let attempts=$attempts-1
          if [ $attempts -eq 0 ]
          then
            echo "{{.TEXT_RED}}docker never came up!{{.TEXT_RESET}}"
            exit 1
          fi
        done
        echo "{{.TEXT_GREEN}}Docker came up!{{.TEXT_RESET}}"
    status:
      - rdctl list-settings > /dev/null 2>&1
      - docker info > /dev/null 2>&1

  clean:
    run: once
    aliases: [destroy, shutdown, delete, off]
    cmds:
      - rdctl shutdown
